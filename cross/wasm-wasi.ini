[constants]
# Update with wasi sdk root for your system
wasi_sdk = '/opt/wasi-sdk-33.0-x86_64-linux'
wasi_sdk_bin = wasi_sdk / 'bin'


[binaries]
cpp = wasi_sdk_bin / 'clang++'
cpp_ld = wasi_sdk_bin / 'wasm-ld'
ar = wasi_sdk_bin / 'llvm-ar'
strip = wasi_sdk_bin / 'llvm-strip'


[built-in options]
cpp_args = ['--target=wasm32-wasip1']
cpp_link_args = []


[host_machine]
system = 'wasi'
cpu_family = 'wasm32'
cpu = 'wasm32'
endian = 'little'
[constants]
root = '/opt/msvc'


[binaries]
cpp = ['clang-cl', '-fuse-ld=lld', '--target=i686-pc-windows-msvc', '/winsysroot', root, '-fms-compatibility']
cpp_ld = ['lld-link', '/winsysroot:' + root]
windres = ['llvm-windres', '--target=i686-pc-windows-msvc', '-I' + root / 'Windows Kits/10/Include/10.0.26100.0/um', '-I' + root / 'Windows Kits/10/Include/10.0.26100.0/shared']
strip = 'llvm-strip'


[host_machine]
system = 'windows'
cpu_family = 'x86'
cpu = 'i686'
endian = 'little'